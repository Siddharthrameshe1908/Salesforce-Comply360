<template>
    <lightning-card title="Compliance Health Overview">
        <template if:true={summary}>
            <div class="dashboard-container">
                <c-compliance-summary-header health-label={summary.healthLabel} health-theme={summary.healthTheme}>
                </c-compliance-summary-header>

                <c-compliance-summary-metrics total-clauses={summary.totalClauses}
                    enforced-clauses={summary.enforcedClauses} in-review-clauses={summary.inReviewClauses}
                    overdue-tasks={summary.overdueTasks}>
                </c-compliance-summary-metrics>

                <div class="top-grid">
                    <c-compliance-clause-status total-clauses={summary.totalClauses}
                        status-items={summary.clauseStatusItems}>
                    </c-compliance-clause-status>

                    <c-compliance-task-table title="Overdue Tasks" record-id={recordId}
                        record-count={summary.overdueTasks} rows={summary.overdueRows} table-type="overdue"
                        helper-text="Requires immediate attention">
                    </c-compliance-task-table>
                </div>

                <div class="bottom-grid">
                    <c-compliance-task-table title="Upcoming Tasks" record-id={recordId}
                        record-count={summary.upcomingTasks} rows={summary.upcomingRows} table-type="upcoming"
                        helper-text="Due within 30 days">
                    </c-compliance-task-table>
                </div>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="error-wrap slds-text-color_error">
                {errorMessage}
            </div>
        </template>

        <template if:false={isLoaded}>
            <div class="spinner-wrap">
                <lightning-spinner alternative-text="Loading summary"></lightning-spinner>
            </div>
        </template>
    </lightning-card>
</template>
