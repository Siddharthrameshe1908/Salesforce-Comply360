                                            </div>
                                        </lightning-record-edit-form>
                                    </template>

                                </div>
                            </div>
                        </template>

                        <!-- ACTIVITY TAB -->
                        <template if:true={isActivityTab}>
                            <div class="crp__tab-pane">
                                <c-clause-activity-panel record-id={selectedClauseId}></c-clause-activity-panel>
                            </div>
                        </template>

                        <!-- CHATTER TAB -->
                        <template if:true={isChatterTab}>
                            <div class="crp__tab-pane">
                                <c-clause-chatter-panel record-id={selectedClauseId}></c-clause-chatter-panel>
                            </div>
                        </template>

                    </div>
                    </div>
                </template>

                <template if:false={selectedClauseId}>
                    <div class="slds-card">
                        <div class="slds-align_absolute-center slds-p-around_large">
                            <p class="slds-text-body_regular slds-text-color_weak">Select a clause from the table.</p>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Right: Document viewer -->
            <div class={rightPanelClass}>
                <c-clause-document-viewer clause-id={selectedClauseId}>
                </c-clause-document-viewer>
            </div>
        </template>

        <template if:true={showVersionModal}>
            <section role="dialog" tabindex="-1" aria-modal="true"
                aria-labelledby="clause-version-confirm-heading" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 id="clause-version-confirm-heading" class="slds-text-heading_medium">Confirm Save</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>Do you want to save and create a new record with these changes?</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="No" onclick={handleDeclineVersioning}
                            disabled={isSaving}></lightning-button>
                        <lightning-button variant="brand" label="Yes" onclick={handleConfirmVersioning}
                            class="slds-m-left_small" disabled={isSaving}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>
    </div>
</template>
