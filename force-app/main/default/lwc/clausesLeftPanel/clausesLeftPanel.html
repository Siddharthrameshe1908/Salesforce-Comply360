<template>
    <div class="clp">
        <div class="clp__toolbar">
            <div class="clp__toolbar-title">
                <span class="slds-text-heading_small slds-text-color_default">Clauses</span>
                <template if:true={totalCount}>
                    <span class="slds-badge slds-badge_lightest slds-m-left_x-small">{totalCount}</span>
                </template>
            </div>

            <div class="clp__toolbar-row">
                <div class="clp__search">
                    <lightning-input
                        type="search"
                        variant="label-hidden"
                        placeholder="Search clauses..."
                        value={searchText}
                        onchange={handleSearch}
                    >
                    </lightning-input>
                </div>

                <div class="clp__filter-btn-wrap">
                    <lightning-formatted-text
                        class="clp__filter-label"
                        value="Filter"
                    >
                    </lightning-formatted-text>
                    <lightning-button-icon
                        icon-name="utility:filterList"
                        variant={filterBtnVariant}
                        alternative-text="Filters"
                        title="Filters"
                        onclick={toggleFilterPopover}
                    >
                    </lightning-button-icon>
                    <template if:true={activeFilterCount}>
                        <span class="clp__filter-badge">{activeFilterCount}</span>
                    </template>

                    <template if:true={isPopoverOpen}>
                        <div
                            class="slds-popover slds-popover_medium slds-nubbin_top-right clp__popover"
                            role="dialog"
                            aria-label="Filter Clauses"
                        >
                            <button
                                class="slds-button slds-button_icon slds-button_icon-small slds-float_right slds-popover__close"
                                onclick={toggleFilterPopover}
                                title="Close"
                            >
                                <lightning-icon icon-name="utility:close" size="x-small" alternative-text="Close"></lightning-icon>
                            </button>

                            <header class="slds-popover__header">
                                <h2 class="slds-text-heading_small">Filter Clauses</h2>
                            </header>

                            <div class="slds-popover__body">
                                <lightning-combobox
                                    label="Risk Level"
                                    value={draft.risk}
                                    options={riskComboOptions}
                                    onchange={handleDraftRisk}
                                >
                                </lightning-combobox>

                                <lightning-combobox
                                    label="Status"
                                    value={draft.status}
                                    options={statusComboOptions}
                                    onchange={handleDraftStatus}
                                    class="slds-m-top_x-small"
                                >
                                </lightning-combobox>

                                <lightning-combobox
                                    label="Industry Domain"
                                    value={draft.domain}
                                    options={domainComboOptions}
                                    onchange={handleDraftDomain}
                                    class="slds-m-top_x-small"
                                >
                                </lightning-combobox>

                                <lightning-combobox
                                    label="Reviewer"
                                    value={draft.reviewer}
                                    options={reviewerComboOptions}
                                    onchange={handleDraftReviewer}
                                    class="slds-m-top_x-small"
                                >
                                </lightning-combobox>

                                <lightning-combobox
                                    label="Type"
                                    value={draft.type}
                                    options={typeComboOptions}
                                    onchange={handleDraftType}
                                    class="slds-m-top_x-small"
                                >
                                </lightning-combobox>
                            </div>

                            <footer class="slds-popover__footer">
                                <div class="slds-grid slds-grid_align-spread">
                                    <lightning-button
                                        label="Clear All"
                                        variant="base"
                                        onclick={clearDraft}
                                    >
                                    </lightning-button>
                                    <lightning-button
                                        label="Apply"
                                        variant="brand"
                                        onclick={applyFilters}
                                    >
                                    </lightning-button>
                                </div>
                            </footer>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <template if:true={hasActiveFilters}>
            <div class="clp__chips">
                <template for:each={activeChips} for:item="chip">
                    <span key={chip.key} class="slds-pill slds-pill_small clp__chip" title={chip.label}>
                        <span class="slds-pill__label">{chip.label}</span>
                        <button
                            class="slds-button slds-button_icon slds-button_icon slds-pill__remove"
                            title="Remove"
                            data-key={chip.key}
                            onclick={removeChip}
                        >
                            <lightning-icon icon-name="utility:close" size="xx-small" alternative-text="Remove"></lightning-icon>
                        </button>
                    </span>
                </template>
            </div>
        </template>

        <div class="clp__count">
            <span class="slds-text-body_small slds-text-color_weak">{filteredCount} clause(s)</span>
        </div>

        <div class="clp__list">
            <div class="clp__tableWrap">
                <template if:false={noResults}>
                    <lightning-datatable
                        key-field="clauseId"
                        data={pagedTableData}
                        columns={columns}
                        sorted-by={sortBy}
                        sorted-direction={sortDirection}
                        onsort={handleSort}
                        onrowaction={handleRowAction}
                        hide-checkbox-column
                    >
                    </lightning-datatable>
                </template>

                <template if:true={noResults}>
                    <div class="slds-align_absolute-center slds-m-top_large">
                        <div class="slds-text-align_center">
                            <lightning-icon icon-name="utility:search" size="small" class="slds-icon-text-default"></lightning-icon>
                            <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">No clauses match your filters.</p>
                        </div>
                    </div>
                </template>
            </div>

            <template if:true={showPagination}>
                <div class="clp__pagination">
                    <div class="clp__pagination-info slds-text-body_small slds-text-color_weak">
                        Showing {startRecord} - {endRecord} of {filteredCount}
                    </div>
                    <div class="clp__pagination-controls">
                        <lightning-button
                            label="Previous"
                            variant="neutral"
                            onclick={handlePreviousPage}
                            disabled={isPreviousDisabled}
                        >
                        </lightning-button>

                        <template for:each={pageButtons} for:item="pageItem">
                            <lightning-button
                                key={pageItem.page}
                                label={pageItem.label}
                                variant={pageItem.variant}
                                data-page={pageItem.page}
                                onclick={handlePageClick}
                                class="clp__page-btn"
                            >
                            </lightning-button>
                        </template>

                        <lightning-button
                            label="Next"
                            variant="neutral"
                            onclick={handleNextPage}
                            disabled={isNextDisabled}
                        >
                        </lightning-button>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
